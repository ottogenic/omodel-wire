name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # tomllib is stdlib 3.11+; the tool is stdlib-only, so 3.11 is the floor.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Syntax check (stdlib only, no deps to install)
        run: python -m py_compile omodel-wire.py

      - name: Run offline test suite
        run: python -m unittest test_omodel_wire -v
